<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StreamDesk — Finanças</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f4f8;--surface:#ffffff;--card:#ffffff;--card2:#f7f9fc;
    --border:#e2e8f0;--accent:#00d4ff;--red:#ff3b5c;--yellow:#ffbb00;
    --green:#00e096;--text:#1a202c;--muted:#718096;--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:420px;margin:0 auto}

  .header{position:sticky;top:0;z-index:50;background:var(--header-bg,rgba(255,255,255,.96));backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:16px 20px}
  .header-top{display:flex;align-items:center;justify-content:space-between}
  .page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
  .page-title span{color:var(--accent)}
  .month-sel{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:50px;overflow:hidden}
  .marrow{background:none;border:none;color:var(--muted);font-size:18px;padding:6px 14px;cursor:pointer}
  .marrow:active{color:var(--accent)}
  .mlabel{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;min-width:90px;text-align:center}

  .content{padding:16px 20px 110px}

  .sec{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
  .sec::after{content:'';flex:1;height:1px;background:var(--border)}

  .sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .sum-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;position:relative;overflow:hidden}
  .sum-card::before{content:'';position:absolute;inset:0;opacity:.05}
  .sum-card.b::before{background:var(--accent)}.sum-card.b{border-color:rgba(0,212,255,.15)}
  .sum-card.c::before{background:var(--red)}.sum-card.c{border-color:rgba(255,59,92,.15)}
  .sum-card.l::before{background:var(--green)}.sum-card.l{border-color:rgba(0,224,150,.2)}
  .sum-icon{font-size:18px;margin-bottom:6px}
  .sum-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;line-height:1;margin-bottom:4px}
  .sum-card.b .sum-val{color:var(--accent)}.sum-card.c .sum-val{color:var(--red)}.sum-card.l .sum-val{color:var(--green)}
  .sum-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
  .chart-inner{display:flex;align-items:center;gap:20px}
  .pizza-wrap{position:relative;flex-shrink:0}
  .pizza-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
  .pizza-total{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:var(--green);line-height:1}
  .pizza-sub{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .legend{flex:1;display:flex;flex-direction:column;gap:8px}
  .legend-item{display:flex;align-items:center;gap:8px}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .legend-name{font-size:11px;font-weight:600;color:var(--text);line-height:1.2}
  .legend-val{font-size:11px;color:var(--muted)}
  .legend-pct{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--accent);margin-left:auto}
  .empty-chart{text-align:center;padding:40px 20px;color:var(--muted)}

  /* PAY LIST */
  .pay-list{display:flex;flex-direction:column;gap:8px}
  .pay-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .pay-main{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .2s}
  .pay-main:active{background:var(--card2)}
  .pay-avatar{width:36px;height:36px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .pay-body{flex:1;min-width:0}
  .pay-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pay-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .pay-right{text-align:right;flex-shrink:0}
  .pay-valor{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--green)}
  .pay-liq{font-size:10px;color:var(--muted);margin-top:2px}
  .pay-liq span{color:var(--green);font-weight:600}
  .pay-btns{display:none;border-top:1px solid var(--border)}
  .pay-btn{flex:1;padding:11px;border:none;background:none;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
  .pay-btn:active{opacity:.6}
  .pay-btn.e{color:var(--accent);border-right:1px solid var(--border)}
  .pay-btn.d{color:var(--red)}

  .no-pay{text-align:center;padding:30px;color:var(--muted);font-size:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}

  .pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 0 4px}
  .page-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 16px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer}
  .page-btn:disabled{opacity:.3;cursor:not-allowed}
  .page-info{font-size:12px;color:var(--muted)}

  /* MODALS */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
  .overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);border-top:1px solid var(--border)}
  .overlay.open .modal{transform:translateY(0)}
  .mhandle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
  .mtitle{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:20px}
  .fg{margin-bottom:14px}
  .fl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block}
  .fi{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;appearance:none}
  .fi:focus{border-color:var(--accent)}
  .fi option{background:var(--card)}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn-save{width:100%;background:var(--accent);color:#000;border:none;border-radius:12px;padding:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;cursor:pointer;margin-top:8px}
  .btn-save:active{transform:scale(.97)}
  .btn-del-confirm{width:100%;background:var(--red);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;cursor:pointer;margin-bottom:10px}
  .btn-cancel{width:100%;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:12px;padding:12px;font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;margin-top:8px}

  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--nav-bg,rgba(255,255,255,.97));backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:10px 0 24px;z-index:50}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0}
  .nav-icon{font-size:20px;transition:transform .2s}
  .nav-label{font-size:8px;color:var(--muted);font-weight:500}
  .nav-item.active .nav-label{color:var(--accent)}
  .nav-item.active .nav-icon{transform:translateY(-2px)}
  .nav-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:-2px;opacity:0}
  .nav-item.active .nav-dot{opacity:1}

  body.dark {
    --bg:#080b12;--surface:#0e1220;--card:#131825;--card2:#161c2c;
    --border:#1c2236;--text:#e4e8f4;--muted:#5a6480;
    --header-bg:rgba(8,11,18,.96);--nav-bg:rgba(14,18,32,.97);
  }
</style>
</head>

<script type="module">
import { initializeApp }                    from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged }      from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { getFirestore, collection, getDocs,
         doc, setDoc, addDoc, deleteDoc }   from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const _app = initializeApp({
  apiKey:"AIzaSyCkWlpyp2-wTBeOWOHoAMLpVQ4vG61KBsc",
  authDomain:"streamdesk-5350d.firebaseapp.com",
  projectId:"streamdesk-5350d",
  storageBucket:"streamdesk-5350d.firebasestorage.app",
  messagingSenderId:"36684694847",
  appId:"1:36684694847:web:0f6f3a27933e3d84cfff8a"
});
const auth = getAuth(_app);
const db   = getFirestore(_app);

var UID = null;
var financas   = [];
var servidores = [];

var MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var currentDate = new Date();
var currentMonth = currentDate.getMonth();
var currentYear  = currentDate.getFullYear();
var editingId = null;

function finRef() { return collection(db,'financas',UID,'lista'); }
function srvRef() { return collection(db,'servidores',UID,'lista'); }

async function loadAll() {
  var [fs,ss] = await Promise.all([getDocs(finRef()), getDocs(srvRef())]);
  financas   = fs.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
  servidores = ss.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
}

async function saveFinanca(f) {
  var {id,...data} = f;
  if(id){ await setDoc(doc(db,'financas',UID,'lista',id),data); }
  else  { await addDoc(finRef(),data); }
}
async function removeFinanca(id){ await deleteDoc(doc(db,'financas',UID,'lista',id)); }

function getCusto(plat) {
  var s=servidores.find(function(x){ return x.nome===plat; });
  if(!s) s=servidores.find(function(x){ return x.nome.toLowerCase()===(plat||'').toLowerCase(); });
  return s ? (parseFloat(s.custo)||0) : 0;
}
function getCor(plat) {
  var s=servidores.find(function(x){ return x.nome===plat; });
  if(!s) s=servidores.find(function(x){ return x.nome.toLowerCase()===(plat||'').toLowerCase(); });
  return s ? (s.cor||'#5a6480') : '#5a6480';
}
function today() {
  var d=new Date(), y=d.getFullYear();
  var m=String(d.getMonth()+1).padStart(2,'0');
  var day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function fmtVal(v){ return 'R$ '+parseFloat(v||0).toFixed(2).replace('.',','); }

function getMonthPays() {
  return financas.filter(function(f){
    if(!f.data) return false;
    var p=f.data.split('-');
    return parseInt(p[1])-1===currentMonth && parseInt(p[0])===currentYear;
  }).sort(function(a,b){ return b.data.localeCompare(a.data); });
}

function render() {
  var pays=getMonthPays();
  document.getElementById('monthLabel').textContent=MONTHS[currentMonth]+' '+currentYear;

  // Totals
  var bruto=0, custo=0;
  pays.forEach(function(f){ bruto+=parseFloat(f.valor||0); custo+=getCusto(f.plataforma); });
  var liq=bruto-custo;
  document.getElementById('totalBruto').textContent=fmtVal(bruto);
  document.getElementById('totalCusto').textContent=fmtVal(custo);
  document.getElementById('totalLiq').textContent=fmtVal(liq);

  renderPizza(pays, liq);
  renderPayments(pays);
}

function renderPizza(pays, totalLiq) {
  var el=document.getElementById('pizzaChart');
  if(!pays.length){ el.innerHTML='<div class="empty-chart">📊 Sem movimentações neste mês</div>'; return; }
  var map={};
  pays.forEach(function(f){
    if(!f.valor||f.valor<=0) return;
    var l=(f.valor||0)-getCusto(f.plataforma);
    if(!map[f.plataforma]) map[f.plataforma]=0;
    map[f.plataforma]+=l;
  });
  var entries=Object.keys(map).map(function(k){return{name:k,val:map[k]};}).sort(function(a,b){return b.val-a.val;});
  if(!entries.length){ el.innerHTML='<div class="empty-chart">📊 Sem dados</div>'; return; }
  var totalAbs=entries.reduce(function(s,e){return s+Math.abs(e.val);},0);
  if(totalAbs===0) totalAbs=1;
  var SIZE=140,R=52,cx=70,cy=70,TWO_PI=2*Math.PI,angle=-Math.PI/2,slices='';
  entries.forEach(function(e){
    e.pct=totalAbs>0?Math.round((Math.abs(e.val)/totalAbs)*100):0;
    e.cor=getCor(e.name);
    var a=(Math.abs(e.val)/totalAbs)*TWO_PI;
    var x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    var x2=cx+R*Math.cos(angle+a),y2=cy+R*Math.sin(angle+a);
    var large=a>Math.PI?1:0;
    slices+='<path d="M '+cx+' '+cy+' L '+x1+' '+y1+' A '+R+' '+R+' 0 '+large+' 1 '+x2+' '+y2+' Z" fill="'+e.cor+'" opacity="0.9"/>';
    angle+=a;
  });
  var center='<circle cx="'+cx+'" cy="'+cy+'" r="38" fill="var(--card)"/>'
    +'<text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="700">R$</text>'
    +'<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" fill="var(--accent)" font-size="13" font-weight="800">'+parseFloat(totalLiq).toFixed(0).replace('-','')+'</text>'
    +'<text x="'+cx+'" y="'+(cy+24)+'" text-anchor="middle" fill="var(--muted)" font-size="8">LÍQUIDO</text>';
  var legend=entries.map(function(e){
    return '<div class="legend-row"><div class="legend-dot" style="background:'+e.cor+'"></div>'
      +'<div class="legend-info"><div class="legend-name">'+e.name+'</div><div class="legend-val">'+fmtVal(e.val)+'</div></div>'
      +'<div class="legend-pct">'+e.pct+'%</div></div>';
  }).join('');
  el.innerHTML='<div class="pizza-wrap">'
    +'<svg viewBox="0 0 '+SIZE+' '+SIZE+'" width="'+SIZE+'" height="'+SIZE+'">'+slices+center+'</svg>'
    +'<div class="legend">'+legend+'</div></div>';
}

var currentPayPage=0;
var PAY_PAGE_SIZE=10;
var filteredPays=[];

function renderPayments(pays) {
  filteredPays=pays;
  currentPayPage=0;
  renderPayPage();
}
function renderPayPage() {
  var total=filteredPays.length,pages=Math.ceil(total/PAY_PAGE_SIZE);
  if(currentPayPage>=pages) currentPayPage=Math.max(0,pages-1);
  var start=currentPayPage*PAY_PAGE_SIZE,end=Math.min(start+PAY_PAGE_SIZE,total);
  var page=filteredPays.slice(start,end);
  var el=document.getElementById('payList');
  if(!page.length){ el.innerHTML='<div class="empty-payments"><div>💸</div><div>Nenhuma movimentação</div></div>'; return; }
  el.innerHTML=page.map(function(f){
    var custo=getCusto(f.plataforma);
    var liq=(f.valor||0)-custo;
    var d=f.data?f.data.split('-'):['','',''];
    var dFmt=d[2]+'/'+d[1]+'/'+d[0];
    return '<div class="pay-card">'
      +'<div class="pay-avatar">🧑</div>'
      +'<div class="pay-info">'
        +'<div class="pay-name">'+f.cliente+'</div>'
        +'<div class="pay-sub">'+(f.plataforma||'')+(f.pagamento?' · '+f.pagamento:'')+' · '+dFmt+'</div>'
      +'</div>'
      +'<div class="pay-vals">'
        +'<div class="pay-bruto">'+fmtVal(f.valor)+'</div>'
        +'<div class="pay-liq">Líq: <b>'+fmtVal(liq)+'</b></div>'
      +'</div>'
      +'<div class="pay-actions">'
        +'<button class="pay-act-btn" onclick="editPay(''+f.id+'')">✏️</button>'
        +'<button class="pay-act-btn del" onclick="deletePay(''+f.id+'')">🗑️</button>'
      +'</div>'
    +'</div>';
  }).join('');
  var pagEl=document.getElementById('payPagination');
  if(pages>1){
    pagEl.innerHTML='<button class="page-btn" onclick="changePayPage(-1)" '+(currentPayPage===0?'disabled':'')+'>‹</button>'
      +'<span class="page-info">'+(start+1)+'–'+end+' de '+total+'</span>'
      +'<button class="page-btn" onclick="changePayPage(1)" '+(currentPayPage>=pages-1?'disabled':'')+'>›</button>';
  } else { pagEl.innerHTML=''; }
}
window.changePayPage=function(dir){
  var pages=Math.ceil(filteredPays.length/PAY_PAGE_SIZE);
  currentPayPage=Math.max(0,Math.min(pages-1,currentPayPage+dir));
  renderPayPage();
};

window.prevMonth=function(){
  if(currentMonth===0){currentMonth=11;currentYear--;} else currentMonth--;
  render();
};
window.nextMonth=function(){
  if(currentMonth===11){currentMonth=0;currentYear++;} else currentMonth++;
  render();
};

window.openModal=function(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Novo Pagamento';
  document.getElementById('fData').value=today();
  document.getElementById('fCliente').value='';
  document.getElementById('fPlataforma').value='';
  document.getElementById('fValor').value='';
  document.getElementById('fPagamento').value='PIX';
  document.getElementById('fObs').value='';
  document.getElementById('payOverlay').classList.add('open');
};
window.closeModal=function(id){ document.getElementById(id).classList.remove('open'); };
window.closeOutside=function(e,id){ if(e.target===document.getElementById(id)) closeModal(id); };

window.editPay=function(id){
  var f=financas.find(function(x){return x.id===id;});
  if(!f) return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Editar Pagamento';
  document.getElementById('fData').value=f.data||'';
  document.getElementById('fCliente').value=f.cliente||'';
  document.getElementById('fPlataforma').value=f.plataforma||'';
  document.getElementById('fValor').value=f.valor||'';
  document.getElementById('fPagamento').value=f.pagamento||'PIX';
  document.getElementById('fObs').value=f.obs||'';
  document.getElementById('payOverlay').classList.add('open');
};

window.savePay=async function(){
  var data=document.getElementById('fData').value;
  var cliente=document.getElementById('fCliente').value.trim();
  var plat=document.getElementById('fPlataforma').value.trim();
  var valor=parseFloat(document.getElementById('fValor').value);
  if(!data||!cliente||!plat||isNaN(valor)){alert('Preencha todos os campos obrigatórios!');return;}
  var f={data,cliente,plataforma:plat,valor,pagamento:document.getElementById('fPagamento').value,obs:document.getElementById('fObs').value};
  if(editingId) f.id=editingId;
  await saveFinanca(f);
  closeModal('payOverlay');
  await loadAll(); render();
};

window.deletePay=async function(id){
  if(!confirm('Remover este pagamento?')) return;
  await removeFinanca(id);
  await loadAll(); render();
};

// ── Init ──────────────────────────────────────────
onAuthStateChanged(auth, async function(user){
  if(!user){location.href='login.html';return;}
  UID=user.uid;
  var cfg=JSON.parse(localStorage.getItem('streamdesk_config')||'{}')||{};
  if(cfg.darkMode===true) document.body.classList.add('dark');
  await loadAll(); render();
});
document.addEventListener('visibilitychange', async function(){
  if(document.visibilityState==='visible'&&UID){
    var cfg2=JSON.parse(localStorage.getItem('streamdesk_config')||'{}')||{};
    if(cfg2.darkMode===true){document.body.classList.add('dark');}else{document.body.classList.remove('dark');}
    await loadAll(); render();
  }
});
</script>
