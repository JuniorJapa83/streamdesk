<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Servidores - StreamDesk</title>
</head>
<body>

<script>
// ====== ESTADO ======
const S = {
  clientes: [],
  servidores: []
};

// ====== UTILS ======
const today = () => new Date().toISOString().slice(0,10);
const tomorrow = () => {
  const d = new Date();
  d.setDate(d.getDate()+1);
  return d.toISOString().slice(0,10);
};

// ====== NOVO getStats (corrigido) ======
function getStats(nome, id) {
  const t = today(), tm = tomorrow();

  const list = S.clientes.filter(c =>
    (c.servidorId && c.servidorId === id) ||
    (!c.servidorId && c.plataforma && c.plataforma === nome)
  );

  const total    = list.length;
  const vencidos = list.filter(c=>c.vencimento<t).length;
  const hoje     = list.filter(c=>c.vencimento===t).length;
  const amanha   = list.filter(c=>c.vencimento===tm).length;
  const emDia    = list.filter(c=>c.vencimento>t).length;

  const pct     = total>0 ? Math.round((emDia/total)*100) : 100;
  const pctInad = total>0 ? Math.round((vencidos/total)*100) : 0;

  return {total,vencidos,hoje,amanha,emDia,pct,pctInad};
}

// ====== EXEMPLO toggleStatus corrigido ======
function toggleStatus(s){
  const t = today();

  const ativos = S.clientes.filter(c =>
    ((c.servidorId && c.servidorId === s.id) ||
     (!c.servidorId && c.plataforma === s.nome)) &&
    c.vencimento >= t
  ).length;

  if(ativos > 0){
    alert("Não pode desligar servidor com clientes ativos");
    return;
  }

  s.status = s.status === 'online' ? 'offline' : 'online';
}

// ====== PROTEÇÃO DOM ======
function renderDashboard(g){
  const dTotal = document.getElementById('dTotal');
  if (dTotal) dTotal.textContent = g.totalSrv;
}

</script>

<h1>Arquivo corrigido pronto</h1>

</body>
</html>
